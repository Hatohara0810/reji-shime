<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レジ締め計算</title>
    <style>
        :root {
            --primary: #1e40af;
            --primary-light: #3b82f6;
            --success: #15803d;
            --success-bg: #dcfce7;
            --danger: #b91c1c;
            --danger-bg: #fee2e2;
            --warning: #92400e;
            --warning-bg: #fef3c7;
            --bg: #f0f4f8;
            --card: #ffffff;
            --border: #cbd5e1;
            --text: #1e293b;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'Meiryo', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }

        /* ── Header ── */
        header {
            background: var(--primary);
            color: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.04em; }
        header p  { margin-top: 2px; font-size: 0.85rem; opacity: 0.85; }

        .settings-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.25); }

        /* ── Card ── */
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }

        /* ── Input table ── */
        table { width: 100%; border-collapse: collapse; }

        thead th {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
            text-align: right;
            padding: 4px 8px;
            border-bottom: 1px solid var(--border);
        }
        thead th:first-child { text-align: left; }

        tbody tr:hover { background: #f8fafc; }

        tbody td {
            padding: 6px 8px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .denom-label { font-size: 1rem; font-weight: 600; }
        .denom-label.bill { color: #1d4ed8; }
        .denom-label.coin { color: #6d28d9; }

        .input-wrap {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: 1px solid var(--border);
            background: #f8fafc;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            color: var(--text);
            flex-shrink: 0;
        }
        .qty-btn:active { background: #e2e8f0; }

        input[type="number"] {
            width: 64px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text);
            background: white;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        .subtotal {
            font-size: 0.9rem;
            font-weight: 600;
            text-align: right;
            min-width: 80px;
            color: var(--muted);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 2px solid var(--border);
        }
        .total-label  { font-size: 1rem; font-weight: 700; }
        .total-amount { font-size: 1.4rem; font-weight: 700; color: var(--primary); }

        /* ── Buttons ── */
        .btn-row { display: flex; gap: 10px; margin-top: 4px; }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.1s, transform 0.1s;
        }
        .btn:active { opacity: 0.85; transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline  { background: white; color: var(--muted); border: 1px solid var(--border); }

        /* ── Result ── */
        #result { display: none; }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .result-box { border-radius: 10px; padding: 14px; text-align: center; }
        .result-box .rb-label  { font-size: 0.78rem; font-weight: 600; margin-bottom: 4px; }
        .result-box .rb-amount { font-size: 1.3rem; font-weight: 700; }

        .box-total   { background: #eff6ff; color: var(--primary); }
        .box-deposit { background: var(--danger-bg); color: var(--danger); }
        .box-keep    { background: var(--success-bg); color: var(--success); }
        .box-warn    { background: var(--warning-bg); color: var(--warning); }

        .section-subtitle {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--muted);
            margin: 14px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-table { width: 100%; border-collapse: collapse; }
        .result-table td {
            padding: 7px 8px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }
        .result-table td:last-child { text-align: right; font-weight: 600; }
        .td-withdraw { color: var(--danger); }
        .td-keep     { color: var(--success); }

        .alert {
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.9rem;
            margin-top: 10px;
            line-height: 1.5;
        }
        .alert-warn    { background: var(--warning-bg); color: var(--warning);  border: 1px solid #fcd34d; }
        .alert-danger  { background: var(--danger-bg);  color: var(--danger);   border: 1px solid #fca5a5; }
        .alert-success { background: var(--success-bg); color: var(--success);  border: 1px solid #86efac; }

        @media (max-width: 400px) {
            .result-grid { grid-template-columns: 1fr; }
        }

        /* ── スマホ対応 ── */
        @media (max-width: 520px) {
            body { padding: 10px; }

            .card { padding: 14px; }

            /* タップしやすいボタンサイズ */
            .qty-btn {
                width: 44px;
                height: 44px;
                font-size: 1.3rem;
                border-radius: 8px;
            }

            /* 入力欄：iOS自動ズーム防止のため16px以上 */
            input[type="number"] {
                width: 60px;
                height: 44px;
                font-size: 16px;
            }

            .subtotal {
                min-width: 64px;
                font-size: 0.82rem;
            }

            tbody td { padding: 5px 4px; }

            .denom-label { font-size: 0.95rem; }

            .btn { padding: 16px; font-size: 1.05rem; }

            /* 設定モーダル：入力欄を次の行に折り返す */
            .setting-row { flex-wrap: wrap; row-gap: 6px; padding: 10px 12px; }

            .setting-inputs {
                flex-basis: 100%;
                margin-left: 56px;
                flex-wrap: wrap;
                gap: 6px 10px;
            }

            .setting-input {
                width: 56px;
                height: 36px;
                font-size: 16px;
            }

            .min-now-btn { height: 30px; font-size: 0.75rem; }

            /* スマホではドラッグハンドル不要、▲▼ボタンを大きく */
            .drag-handle { display: none; }
            .move-btn { width: 34px; height: 28px; font-size: 0.85rem; }
        }

        /* ── Settings Modal ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-backdrop.open { display: flex; }

        .modal {
            background: white;
            border-radius: 16px;
            width: min(100%, 480px);
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .modal-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--primary); }

        .close-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 30px;
            height: 30px;
            font-size: 1rem;
            cursor: pointer;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover { background: #f1f5f9; }

        .modal-desc {
            font-size: 0.8rem;
            color: var(--muted);
            padding: 10px 20px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            line-height: 1.6;
            flex-shrink: 0;
        }

        .modal-body {
            overflow-y: auto;
            flex: 1;
            padding: 8px 0;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .modal-footer .btn { padding: 12px; }

        /* ── Setting rows ── */
        .setting-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid #f1f5f9;
            background: white;
            cursor: default;
            transition: background 0.1s;
            user-select: none;
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-row.dragging { opacity: 0.4; background: #f0f9ff; }
        .setting-row.drag-over-top    { border-top: 2px solid var(--primary-light); }
        .setting-row.drag-over-bottom { border-bottom: 2px solid var(--primary-light); }

        .priority-badge {
            min-width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .drag-handle {
            color: #94a3b8;
            font-size: 1rem;
            cursor: grab;
            padding: 0 2px;
            flex-shrink: 0;
            line-height: 1;
        }
        .drag-handle:active { cursor: grabbing; }

        .denom-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .denom-name.bill { color: #1d4ed8; }
        .denom-name.coin { color: #6d28d9; }

        .setting-inputs {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .setting-field {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .setting-input {
            width: 52px;
            height: 30px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            font-size: 0.85rem;
            font-family: inherit;
            color: var(--text);
            -moz-appearance: textfield;
        }
        .setting-input::-webkit-inner-spin-button,
        .setting-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .setting-input:disabled {
            background: #f1f5f9;
            color: #b0b8c8;
            border-color: #e2e8f0;
        }

        .min-now-btn {
            height: 26px;
            padding: 0 5px;
            border: 1px solid var(--primary-light);
            background: #eff6ff;
            color: var(--primary);
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }
        .min-now-btn:active { background: #dbeafe; }

        .move-btns {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-shrink: 0;
        }
        .move-btn {
            width: 26px;
            height: 20px;
            border: 1px solid var(--border);
            background: #f8fafc;
            border-radius: 4px;
            font-size: 0.65rem;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }
        .move-btn:disabled { color: #cbd5e1; cursor: default; background: #f8fafc; }
        .move-btn:not(:disabled):active { background: #e2e8f0; }

        .max-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 600;
            user-select: none;
        }
        .max-toggle-wrap input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: var(--primary);
            flex-shrink: 0;
        }

        .setting-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
        }
    </style>
</head>
<body>

<!-- ── Header ── -->
<header>
    <div class="header-inner">
        <div>
            <h1>レジ締め計算ツール</h1>
            <p>翌日両替分 残高目標：¥80,000</p>
        </div>
        <button class="settings-btn" onclick="openSettings()" title="設定">⚙</button>
    </div>
</header>

<!-- ── 現金入力 ── -->
<div class="card">
    <div class="card-title">現金入力</div>
    <table>
        <thead>
            <tr>
                <th>金種</th>
                <th>枚数</th>
                <th>小計</th>
            </tr>
        </thead>
        <tbody id="denomTable"></tbody>
    </table>
    <div class="total-row">
        <span class="total-label">合計</span>
        <span class="total-amount" id="totalDisplay">¥0</span>
    </div>
</div>

<!-- ── ボタン ── -->
<div class="btn-row">
    <button class="btn btn-primary" onclick="calculate()">計 算</button>
    <button class="btn btn-outline"  onclick="resetAll()">リセット</button>
</div>
<div class="btn-row" style="margin-top:8px">
    <button class="btn btn-outline" style="font-size:0.85rem;padding:10px" onclick="openDataExport()">
        📋 データ出力（デバッグ用）
    </button>
</div>

<!-- ── 計算結果 ── -->
<div id="result">
    <div class="card" style="margin-top:16px">
        <div class="card-title">計算結果</div>

        <div class="result-grid">
            <div class="result-box box-total">
                <div class="rb-label">現金合計</div>
                <div class="rb-amount" id="rTotal">¥0</div>
            </div>
            <div class="result-box box-deposit" id="rDepositBox">
                <div class="rb-label">売上（取り出し）</div>
                <div class="rb-amount" id="rDeposit">¥0</div>
            </div>
            <div class="result-box box-keep">
                <div class="rb-label">レジに残す</div>
                <div class="rb-amount" id="rKeepAmt">¥80,000</div>
            </div>
            <div class="result-box" id="rExtraBox" style="display:none">
                <div class="rb-label" id="rExtraLabel"></div>
                <div class="rb-amount" id="rExtra">¥0</div>
            </div>
        </div>

        <div id="alertArea"></div>

        <div id="withdrawSection" style="display:none">
            <div class="section-subtitle">取り出す金種</div>
            <table class="result-table" id="withdrawTable"></table>
        </div>

        <div id="keepSection" style="display:none">
            <div class="section-subtitle">レジに残す金種</div>
            <table class="result-table" id="keepTable"></table>
        </div>
    </div>
</div>

<!-- ── データ出力モーダル ── -->
<div class="modal-backdrop" id="dataExportBackdrop">
    <div class="modal">
        <div class="modal-header">
            <h2>📋 データ出力</h2>
            <button class="close-btn" onclick="closeDataExport()">✕</button>
        </div>
        <div class="modal-desc">
            以下のテキストをコピーしてチャットに貼り付けてください
        </div>
        <div style="padding:12px 16px; flex:1; overflow-y:auto;">
            <textarea id="dataExportText"
                style="width:100%; height:340px; font-size:0.75rem; font-family:monospace;
                       border:1px solid var(--border); border-radius:8px; padding:10px;
                       resize:none; color:var(--text); line-height:1.5;"
                readonly></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeDataExport()">閉じる</button>
            <button class="btn btn-primary" onclick="copyDataExport()">コピー</button>
        </div>
    </div>
</div>

<!-- ── 設定モーダル ── -->
<div class="modal-backdrop" id="settingsBackdrop">
    <div class="modal">
        <div class="modal-header">
            <h2>⚙ 設定</h2>
            <button class="close-btn" onclick="closeSettings(false)">✕</button>
        </div>
        <div class="modal-desc">
            優先順位：上が高い（☰ をドラッグして並べ替え）<br>
            最低枚数をすべて確保した後、上から順に最大枚数まで残高を埋めます
        </div>
        <div class="modal-body">
            <div id="settingsList"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeSettings(false)">キャンセル</button>
            <button class="btn btn-primary" onclick="closeSettings(true)">保存して閉じる</button>
        </div>
    </div>
</div>

<script>
    // ─────────────── 定数 ───────────────
    const DENOMINATIONS = [
        { value: 10000, label: '10,000円', type: 'bill' },
        { value:  5000, label:  '5,000円', type: 'bill' },
        { value:  2000, label:  '2,000円', type: 'bill' },
        { value:  1000, label:  '1,000円', type: 'bill' },
        { value:   500, label:    '500円', type: 'coin' },
        { value:   100, label:    '100円', type: 'coin' },
        { value:    50, label:     '50円', type: 'coin' },
        { value:    10, label:     '10円', type: 'coin' },
        { value:     5, label:      '5円', type: 'coin' },
        { value:     1, label:      '1円', type: 'coin' },
    ];

    const TARGET = 80000;
    const STORAGE_KEY = 'レジ締め設定v2';

    // ─────────────── 設定状態 ───────────────
    let priorityOrder = [50, 100, 500, 5000, 1000, 10, 2000, 10000, 5, 1];
    let settings = {};
    const DEFAULT_MAX = { 10000: 0, 5000: 50, 2000: 50, 1000: 50, 500: 150, 100: 150, 50: 150, 10: 0, 5: 0, 1: 0 };
    DENOMINATIONS.forEach(d => {
        settings[d.value] = { min: 0, max: DEFAULT_MAX[d.value] };
    });

    function loadSettings() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            const data = JSON.parse(raw);
            if (Array.isArray(data.priorityOrder) && data.priorityOrder.length === DENOMINATIONS.length) {
                priorityOrder = data.priorityOrder;
            }
            if (data.settings) {
                DENOMINATIONS.forEach(d => {
                    if (data.settings[d.value]) {
                        settings[d.value] = data.settings[d.value];
                    }
                });
            }
        } catch(e) {}
    }

    function persistSettings() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ priorityOrder, settings }));
        } catch(e) {}
    }

    loadSettings();

    // ─────────────── 入力テーブル構築 ───────────────
    const tbody = document.getElementById('denomTable');
    DENOMINATIONS.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><span class="denom-label ${d.type}">${d.label}</span></td>
            <td>
                <div class="input-wrap">
                    <button class="qty-btn" onclick="adjust(${d.value}, -1)">−</button>
                    <input type="number" id="d${d.value}" value="0" min="0" step="1"
                           inputmode="numeric"
                           oninput="onInput(${d.value})" onchange="onInput(${d.value})">
                    <button class="qty-btn" onclick="adjust(${d.value}, 1)">＋</button>
                </div>
            </td>
            <td><span class="subtotal" id="sub${d.value}">¥0</span></td>
        `;
        tbody.appendChild(tr);
    });

    // ─────────────── 入力ヘルパー ───────────────
    function getCount(value) {
        return Math.max(0, parseInt(document.getElementById(`d${value}`).value) || 0);
    }

    function formatYen(n) {
        return '¥' + n.toLocaleString('ja-JP');
    }

    function getTotal() {
        return DENOMINATIONS.reduce((s, d) => s + d.value * getCount(d.value), 0);
    }

    function onInput(value) {
        const count = getCount(value);
        document.getElementById(`sub${value}`).textContent = formatYen(value * count);
        document.getElementById('totalDisplay').textContent = formatYen(getTotal());
    }

    function adjust(value, delta) {
        const input = document.getElementById(`d${value}`);
        input.value = Math.max(0, (parseInt(input.value) || 0) + delta);
        onInput(value);
    }

    function resetAll() {
        DENOMINATIONS.forEach(d => {
            document.getElementById(`d${d.value}`).value = 0;
            document.getElementById(`sub${d.value}`).textContent = '¥0';
        });
        document.getElementById('totalDisplay').textContent = '¥0';
        document.getElementById('result').style.display = 'none';
    }

    // ─────────────── 計算ロジック ───────────────
    function calculate() {
        const counts = {};
        DENOMINATIONS.forEach(d => { counts[d.value] = getCount(d.value); });
        const total = DENOMINATIONS.reduce((s, d) => s + d.value * counts[d.value], 0);

        // デバッグ用スナップショット
        const snapShot = s => { const o = {}; DENOMINATIONS.forEach(d => { o[d.value] = s[d.value] || 0; }); return o; };
        const debugSteps = {};

        // Step1: 最低枚数を確保
        const kept = {};
        let keepTotal = 0;
        priorityOrder.forEach(val => {
            const have   = counts[val] || 0;
            const minAmt = Math.min(have, settings[val].min);
            kept[val]    = minAmt;
            keepTotal   += minAmt * val;
        });
        debugSteps['Step1'] = snapShot(kept);

        // Step2: 優先順位順に最大枚数まで積み上げ（硬貨は10枚単位）
        let budget = TARGET - keepTotal;
        if (budget > 0) {
            priorityOrder.forEach(val => {
                if (budget <= 0) return;
                const isCoin  = DENOMINATIONS.find(x => x.value === val).type === 'coin';
                const have    = counts[val] || 0;
                const already = kept[val];
                let canAdd = Math.min(
                    have - already,
                    settings[val].max - already,
                    Math.floor(budget / val)
                );
                if (isCoin) canAdd = Math.floor(canAdd / 10) * 10;
                if (canAdd > 0) {
                    kept[val] += canAdd;
                    budget    -= canAdd * val;
                }
            });
        }

        debugSteps['Step2'] = snapShot(kept);

        // Step2b: 端数解消パス（お札1枚追加＋硬貨削減でmax=0の金種を使わずに済ませる）
        {
            let gap = TARGET - DENOMINATIONS.reduce((s, d) => s + d.value * (kept[d.value] || 0), 0);
            if (gap > 0) {
                const billVals = DENOMINATIONS.filter(d => d.type === 'bill').map(d => d.value).sort((a, b) => a - b);
                const coinVals = DENOMINATIONS.filter(d => d.type === 'coin').map(d => d.value);

                for (const bv of billVals) {
                    if (gap <= 0) break;
                    const billAvail = Math.min(counts[bv] || 0, settings[bv].max) - (kept[bv] || 0);
                    if (billAvail <= 0) continue;

                    const surplus = bv - gap;
                    if (surplus < 0) continue; // このお札1枚では補いきれない

                    if (surplus === 0) {
                        kept[bv] = (kept[bv] || 0) + 1;
                        gap = 0;
                        break;
                    }

                    // surplus分を硬貨から10枚単位で削減できるか試みる
                    const reduce = {};
                    let remaining = surplus;
                    for (const cv of [...coinVals].sort((a, b) => a - b)) {
                        if (remaining <= 0) break;
                        const avail = (kept[cv] || 0) - (settings[cv]?.min || 0);
                        if (avail <= 0) continue;
                        const maxUse = Math.min(avail, Math.floor(remaining / cv));
                        const use = Math.floor(maxUse / 10) * 10;
                        if (use <= 0) continue;
                        reduce[cv] = use;
                        remaining -= use * cv;
                    }

                    if (remaining !== 0) continue;

                    kept[bv] = (kept[bv] || 0) + 1;
                    for (const [cv, cnt] of Object.entries(reduce)) kept[Number(cv)] -= cnt;
                    gap = 0;
                    break;
                }
            }
        }

        debugSteps['Step2b'] = snapShot(kept);

        // Step3: 最大枚数を超えて補充（硬貨は10枚単位）
        let budget2 = TARGET - DENOMINATIONS.reduce((s, d) => s + d.value * (kept[d.value] || 0), 0);
        if (budget2 > 0) {
            priorityOrder.forEach(val => {
                if (budget2 <= 0) return;
                const isCoin  = DENOMINATIONS.find(x => x.value === val).type === 'coin';
                const have    = counts[val] || 0;
                const already = kept[val];
                let canAdd = Math.min(have - already, Math.floor(budget2 / val));
                if (isCoin) canAdd = Math.floor(canAdd / 10) * 10;
                if (canAdd > 0) {
                    kept[val] += canAdd;
                    budget2   -= canAdd * val;
                }
            });
        }

        debugSteps['Step3'] = snapShot(kept);

        // Step4: どうしても埋まらない端数を1枚単位で補充（最終手段）
        let budget3 = TARGET - DENOMINATIONS.reduce((s, d) => s + d.value * (kept[d.value] || 0), 0);
        if (budget3 > 0) {
            priorityOrder.forEach(val => {
                if (budget3 <= 0) return;
                const have    = counts[val] || 0;
                const already = kept[val];
                const canAdd  = Math.min(have - already, Math.floor(budget3 / val));
                if (canAdd > 0) {
                    kept[val] += canAdd;
                    budget3   -= canAdd * val;
                }
            });
        }

        debugSteps['Step4'] = snapShot(kept);

        // Step5: 整理パス（10枚単位を維持しながら小さい硬貨を大きい硬貨にまとめる）
        // 10枚ずつ追加・削減することで常に10の倍数を保つ
        {
            const coinVals = DENOMINATIONS
                .filter(d => d.type === 'coin')
                .map(d => d.value); // 大きい順 [500, 100, 50, 10, 5, 1]

            let swapped = true;
            while (swapped) {
                swapped = false;
                for (const largeVal of priorityOrder) {
                    const largeD = DENOMINATIONS.find(d => d.value === largeVal);
                    if (!largeD || largeD.type !== 'coin') continue;
                    const roomForLarge = Math.min(
                        counts[largeVal] - (kept[largeVal] || 0),
                        settings[largeVal].max - (kept[largeVal] || 0)
                    );
                    if (roomForLarge < 10) continue;

                    // largeVal×10円分を小さい硬貨で作れるか
                    let need = largeVal * 10;
                    const reduce = {};
                    for (const sv of coinVals.filter(v => v < largeVal)) {
                        const avail = (kept[sv] || 0) - (settings[sv]?.min || 0);
                        if (avail <= 0) continue;
                        const use = Math.min(avail, Math.floor(need / sv));
                        if (use > 0) { reduce[sv] = use; need -= use * sv; }
                        if (need === 0) break;
                    }
                    if (need !== 0) continue; // ちょうど作れなかった
                    if (!Object.values(reduce).every(n => n % 10 === 0)) continue; // 減らす枚数も10の倍数でなければスキップ

                    // 交換実行（10枚単位）
                    kept[largeVal] = (kept[largeVal] || 0) + 10;
                    for (const [sv, cnt] of Object.entries(reduce)) kept[Number(sv)] -= cnt;
                    swapped = true;
                }
            }
        }

        debugSteps['Step5'] = snapShot(kept);

        // Step6: 硬貨の枚数が10の倍数でなければ高い金種から補って切り上げる
        // 小さい順に処理することで「50円→100円→500円」と連鎖的に揃えられる
        {
            const coinAsc = [...DENOMINATIONS]
                .filter(d => d.type === 'coin')
                .reverse(); // 小→大: [1, 5, 10, 50, 100, 500]

            for (const d of coinAsc) {
                const current = kept[d.value] || 0;
                if (current === 0 || current % 10 === 0) continue;

                const toAdd        = 10 - (current % 10);
                if (current + toAdd > (counts[d.value] || 0)) continue; // 手持ちが足りない
                const neededValue  = toAdd * d.value;
                let   remaining    = neededValue;
                const reduce       = {};

                // d.valueより大きい金種から大きい順に調達
                for (const h of DENOMINATIONS.filter(x => x.value > d.value)) {
                    if (remaining <= 0) break;
                    const avail = (kept[h.value] || 0) - (settings[h.value]?.min || 0);
                    if (avail <= 0) continue;
                    const use = Math.min(avail, Math.floor(remaining / h.value));
                    if (use > 0) { reduce[h.value] = use; remaining -= use * h.value; }
                }

                if (remaining !== 0) continue; // ちょうど作れない場合はスキップ

                kept[d.value] = current + toAdd;
                for (const [hv, cnt] of Object.entries(reduce)) kept[Number(hv)] -= cnt;
            }
        }

        debugSteps['Step6'] = snapShot(kept);

        // Step7: 非10倍数の硬貨を修復（丸め下げ＋お札1枚追加＋余剰分を小硬貨から回収）
        {
            const coinVals = DENOMINATIONS.filter(d => d.type === 'coin').map(d => d.value); // 大→小
            const billVals = DENOMINATIONS.filter(d => d.type === 'bill').map(d => d.value).sort((a, b) => a - b); // 小→大

            for (const d of DENOMINATIONS.filter(x => x.type === 'coin')) {
                const current = kept[d.value] || 0;
                if (current % 10 === 0) continue;

                const roundedDown = Math.floor(current / 10) * 10;
                const deficit = (current - roundedDown) * d.value; // 丸め下げで解放される金額

                for (const bv of billVals) {
                    const billAvail = Math.min(counts[bv] || 0, settings[bv].max) - (kept[bv] || 0);
                    if (billAvail <= 0) continue;

                    const surplus = bv - deficit; // お札追加後に余る金額→硬貨から回収する量
                    if (surplus < 0) continue;

                    // roundedDown適用後の仮状態で余剰分を小さい硬貨から10の倍数単位で回収できるか試みる
                    const tempKept = Object.assign({}, kept);
                    tempKept[d.value] = roundedDown;

                    const reduce = {};
                    let remaining = surplus;

                    for (const cv of [...coinVals].sort((a, b) => a - b)) { // 小→大
                        if (remaining <= 0) break;
                        const avail = (tempKept[cv] || 0) - (settings[cv]?.min || 0);
                        if (avail <= 0) continue;
                        const maxUse = Math.min(avail, Math.floor(remaining / cv));
                        const use = Math.floor(maxUse / 10) * 10;
                        if (use <= 0) continue;
                        reduce[cv] = (reduce[cv] || 0) + use;
                        remaining -= use * cv;
                    }

                    if (remaining !== 0) continue; // ちょうど回収できない場合はスキップ

                    // 適用
                    kept[d.value] = roundedDown;
                    kept[bv] = (kept[bv] || 0) + 1;
                    for (const [cv, cnt] of Object.entries(reduce)) kept[Number(cv)] -= cnt;
                    break;
                }
            }
        }

        debugSteps['Step7'] = snapShot(kept);

        const keptTotal = DENOMINATIONS.reduce((s, d) => s + d.value * (kept[d.value] || 0), 0);
        const withdrawn = total - keptTotal;
        lastDebugData = { total, keptTotal, withdrawn, kept: snapShot(kept), steps: debugSteps };

        // ── 表示 ──
        document.getElementById('result').style.display = 'block';
        document.getElementById('rTotal').textContent   = formatYen(total);
        document.getElementById('alertArea').innerHTML  = '';

        if (total < TARGET) {
            document.getElementById('rDeposit').textContent   = '−';
            document.getElementById('rDepositBox').className  = 'result-box box-warn';
            document.getElementById('rKeepAmt').textContent   = formatYen(keptTotal);
            document.getElementById('rExtraBox').style.display = 'none';
            document.getElementById('withdrawSection').style.display = 'none';
            document.getElementById('keepSection').style.display    = 'none';
            document.getElementById('alertArea').innerHTML = `
                <div class="alert alert-danger">
                    合計が目標残高 ¥80,000 を下回っています（不足: ${formatYen(TARGET - total)}）
                </div>`;
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
            return;
        }

        document.getElementById('rDeposit').textContent  = formatYen(withdrawn);
        document.getElementById('rDepositBox').className = 'result-box box-deposit';
        document.getElementById('rKeepAmt').textContent  = formatYen(keptTotal);

        const diff = keptTotal - TARGET;
        if (diff < 0) {
            // 手持ちの現金が足りず80,000に届かなかった（小銭が端数で合わない等）
            document.getElementById('rExtraBox').style.display = 'block';
            document.getElementById('rExtraBox').className     = 'result-box box-warn';
            document.getElementById('rExtraLabel').textContent = '目標との差';
            document.getElementById('rExtra').textContent      = `−${formatYen(-diff)}`;
            document.getElementById('alertArea').innerHTML = `
                <div class="alert alert-warn">
                    現金の金種の組み合わせで ¥80,000 ちょうどにできません。<br>
                    残高: ${formatYen(keptTotal)}（差額: ${formatYen(-diff)}）
                </div>`;
        } else if (diff > 0) {
            // 最低枚数の合計が80,000を超えた
            document.getElementById('rExtraBox').style.display = 'block';
            document.getElementById('rExtraBox').className     = 'result-box box-warn';
            document.getElementById('rExtraLabel').textContent = '超過分';
            document.getElementById('rExtra').textContent      = `+${formatYen(diff)}`;
            document.getElementById('alertArea').innerHTML = `
                <div class="alert alert-warn">
                    最低枚数の合計が ¥80,000 を超えています（超過: ${formatYen(diff)}）。<br>
                    設定の最低枚数を見直してください。
                </div>`;
        } else {
            document.getElementById('rExtraBox').style.display = 'none';
            document.getElementById('alertArea').innerHTML = `
                <div class="alert alert-success">ちょうど ¥80,000 をレジに残せます。</div>`;
        }

        // 取り出し内訳
        const wTable = document.getElementById('withdrawTable');
        wTable.innerHTML = '';
        let hasW = false;
        DENOMINATIONS.forEach(d => {
            const take = counts[d.value] - (kept[d.value] || 0);
            if (take > 0) {
                hasW = true;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${d.label}</td><td>${take} 枚</td><td class="td-withdraw">− ${formatYen(d.value * take)}</td>`;
                wTable.appendChild(tr);
            }
        });
        if (!hasW) {
            wTable.innerHTML = '<tr><td colspan="3" style="color:#64748b;padding:8px">取り出す金種なし</td></tr>';
        }
        document.getElementById('withdrawSection').style.display = 'block';

        // 残す内訳
        const kTable = document.getElementById('keepTable');
        kTable.innerHTML = '';
        DENOMINATIONS.forEach(d => {
            const k = kept[d.value] || 0;
            if (k > 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${d.label}</td><td>${k} 枚</td><td class="td-keep">${formatYen(d.value * k)}</td>`;
                kTable.appendChild(tr);
            }
        });
        if (kTable.innerHTML === '') {
            kTable.innerHTML = '<tr><td colspan="3" style="color:#64748b;padding:8px">なし</td></tr>';
        }
        document.getElementById('keepSection').style.display = 'block';

        document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ─────────────── データ出力 ───────────────
    let lastDebugData = null;

    function openDataExport() {
        const counts = {};
        DENOMINATIONS.forEach(d => { counts[d.value] = getCount(d.value); });

        const lines = [];

        lines.push('=== 入力データ ===');
        DENOMINATIONS.forEach(d => {
            const c = counts[d.value];
            if (c > 0) lines.push(`  ${d.label}: ${c}枚 (${formatYen(d.value * c)})`);
        });
        const total = DENOMINATIONS.reduce((s, d) => s + d.value * counts[d.value], 0);
        lines.push(`  合計: ${formatYen(total)}`);

        lines.push('');
        lines.push('=== 設定 ===');
        lines.push('  優先順位:');
        priorityOrder.forEach((val, i) => {
            const d = DENOMINATIONS.find(x => x.value === val);
            lines.push(`    ${i+1}位: ${d.label} (最低${settings[val].min}枚 / 最大${settings[val].max}枚)`);
        });

        if (lastDebugData) {
            lines.push('');
            lines.push('=== 計算結果 ===');
            lines.push(`  現金合計: ${formatYen(lastDebugData.total)}`);
            lines.push(`  レジ残高: ${formatYen(lastDebugData.keptTotal)}`);
            lines.push(`  取り出し: ${formatYen(lastDebugData.withdrawn)}`);
            lines.push('  レジに残す内訳:');
            DENOMINATIONS.forEach(d => {
                const k = lastDebugData.kept[d.value] || 0;
                if (k > 0) lines.push(`    ${d.label}: ${k}枚 (${formatYen(d.value * k)})`);
            });
            lines.push('  取り出す内訳:');
            DENOMINATIONS.forEach(d => {
                const take = (counts[d.value] || 0) - (lastDebugData.kept[d.value] || 0);
                if (take > 0) lines.push(`    ${d.label}: ${take}枚 (${formatYen(d.value * take)})`);
            });
            lines.push('');
            lines.push('=== 各ステップ後の枚数 ===');
            ['Step1','Step2','Step2b','Step3','Step4','Step5','Step6','Step7'].forEach(step => {
                const snap = lastDebugData.steps[step];
                if (!snap) return;
                lines.push(`  ${step}:`);
                DENOMINATIONS.forEach(d => {
                    const k = snap[d.value] || 0;
                    if (k > 0) lines.push(`    ${d.label}: ${k}枚`);
                });
            });
        } else {
            lines.push('');
            lines.push('=== 計算結果 ===');
            lines.push('  （まだ計算していません）');
        }

        document.getElementById('dataExportText').value = lines.join('\n');
        document.getElementById('dataExportBackdrop').classList.add('open');
    }

    function closeDataExport() {
        document.getElementById('dataExportBackdrop').classList.remove('open');
    }

    function copyDataExport() {
        const ta = document.getElementById('dataExportText');
        ta.select();
        ta.setSelectionRange(0, 99999);
        try {
            navigator.clipboard.writeText(ta.value).catch(() => document.execCommand('copy'));
        } catch(e) {
            document.execCommand('copy');
        }
        const btn = event.target;
        btn.textContent = 'コピーしました！';
        setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
    }

    document.getElementById('dataExportBackdrop').addEventListener('click', function(e) {
        if (e.target === this) closeDataExport();
    });

    // ─────────────── 設定モーダル ───────────────
    let tempSettings     = {};
    let tempPriority     = [];
    let dragSrcIdx       = null;

    function setMinToCurrent(val) {
        saveTempInputs();
        tempSettings[val].min = getCount(val);
        const el = document.getElementById(`smin_${val}`);
        if (el) el.value = tempSettings[val].min;
    }

    function openSettings() {
        tempSettings = JSON.parse(JSON.stringify(settings));
        tempPriority  = [...priorityOrder];
        renderSettingsTable();
        document.getElementById('settingsBackdrop').classList.add('open');
    }

    function closeSettings(save) {
        if (save) {
            saveTempInputs();
            settings      = JSON.parse(JSON.stringify(tempSettings));
            priorityOrder = [...tempPriority];
            persistSettings();
        }
        document.getElementById('settingsBackdrop').classList.remove('open');
    }

    // モーダル外クリックで閉じる（キャンセル扱い）
    document.getElementById('settingsBackdrop').addEventListener('click', function(e) {
        if (e.target === this) closeSettings(false);
    });

    function saveTempInputs() {
        tempPriority.forEach(val => {
            const minEl   = document.getElementById(`smin_${val}`);
            const maxEl = document.getElementById(`smax_${val}`);
            if (minEl) tempSettings[val].min = Math.max(0, parseInt(minEl.value) || 0);
            if (maxEl) tempSettings[val].max = Math.max(0, parseInt(maxEl.value) || 0);
        });
    }

    function moveRow(idx, dir) {
        saveTempInputs();
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= tempPriority.length) return;
        [tempPriority[idx], tempPriority[newIdx]] = [tempPriority[newIdx], tempPriority[idx]];
        renderSettingsTable();
    }

    function renderSettingsTable() {
        const container = document.getElementById('settingsList');
        container.innerHTML = '';

        tempPriority.forEach((val, idx) => {
            const d   = DENOMINATIONS.find(x => x.value === val);
            const s   = tempSettings[val];
            const row = document.createElement('div');
            row.className    = 'setting-row';
            row.draggable    = true;
            row.dataset.idx  = idx;

            row.innerHTML = `
                <span class="priority-badge">${idx + 1}</span>
                <span class="drag-handle">☰</span>
                <div class="move-btns">
                    <button class="move-btn" onclick="moveRow(${idx}, -1)" ${idx === 0 ? 'disabled' : ''}>▲</button>
                    <button class="move-btn" onclick="moveRow(${idx},  1)" ${idx === tempPriority.length - 1 ? 'disabled' : ''}>▼</button>
                </div>
                <span class="denom-name ${d.type}">${d.label}</span>
                <div class="setting-inputs">
                    <div class="setting-field">
                        <label>最低</label>
                        <input type="number" class="setting-input" id="smin_${val}"
                            value="${s.min}" min="0" max="999" inputmode="numeric">
                        <button class="min-now-btn" onclick="setMinToCurrent(${val})">今</button>
                        <span>枚</span>
                    </div>
                    <div class="setting-field">
                        <label>最大</label>
                        <input type="number" class="setting-input" id="smax_${val}"
                            value="${s.max}" min="0" max="999" inputmode="numeric">
                        <span>枚</span>
                    </div>
                </div>
            `;

            // ドラッグ&ドロップ
            row.addEventListener('dragstart', e => {
                saveTempInputs();
                dragSrcIdx = idx;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => row.classList.add('dragging'), 0);
            });

            row.addEventListener('dragend', () => {
                dragSrcIdx = null;
                container.querySelectorAll('.setting-row').forEach(r => {
                    r.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
                });
            });

            row.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                container.querySelectorAll('.setting-row').forEach(r => {
                    r.classList.remove('drag-over-top', 'drag-over-bottom');
                });
                const rect  = row.getBoundingClientRect();
                const midY  = rect.top + rect.height / 2;
                row.classList.add(e.clientY < midY ? 'drag-over-top' : 'drag-over-bottom');
            });

            row.addEventListener('dragleave', () => {
                row.classList.remove('drag-over-top', 'drag-over-bottom');
            });

            row.addEventListener('drop', e => {
                e.preventDefault();
                if (dragSrcIdx === null || dragSrcIdx === idx) return;
                const rect    = row.getBoundingClientRect();
                const midY    = rect.top + rect.height / 2;
                let dropIdx   = e.clientY < midY ? idx : idx + 1;
                if (dragSrcIdx < dropIdx) dropIdx--;
                const moved = tempPriority.splice(dragSrcIdx, 1)[0];
                tempPriority.splice(dropIdx, 0, moved);
                dragSrcIdx = null;
                renderSettingsTable();
            });

            container.appendChild(row);
        });
    }
</script>
